<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <div class="range-controls">
    <mat-form-field appearance="outline">
      <mat-label>Desde</mat-label>
      <input matInput type="datetime-local" #fromInput />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Hasta</mat-label>
      <input matInput type="datetime-local" #toInput />
    </mat-form-field>
    <button
      mat-stroked-button
      type="button"
      (click)="applyRange(fromInput.value, toInput.value)"
    >
      Aplicar rango
    </button>
  </div>

  <div class="zoom-chart">
    <canvas
      baseChart
      [data]="chart.data"
      [options]="chart.options"
      [type]="chart.type || 'line'"
    ></canvas>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Cerrar</button>
</mat-dialog-actions>
